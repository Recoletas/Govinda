site_name: Govinda — Qwen3.5-27B DCU 推理优化
site_url: https://recoletas.github.io/Govinda/
site_description: 2026 全国大学生计算机系统能力大赛 · 智能计算创新设计赛参赛项目
repo_url: https://github.com/Recoletas/Govinda
repo_name: Recoletas/Govinda
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.index
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - 首页: index.md
  - 设计文档:
      - specs/2026-06-09-qwen-inference-optimization-design.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Recoletas/Govinda
      name: GitHub 仓库

copyright: Copyright &copy; 2026 Recoletas and Govinda contributors · MIT License

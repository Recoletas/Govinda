site_name: Govinda — Qwen3.5-27B DCU 推理优化
site_url: https://recoletas.github.io/Govinda/
site_description: 2026 全国大学生计算机系统能力大赛 · 智能计算创新设计赛参赛项目
repo_url: https://github.com/Recoletas/Govinda
repo_name: Recoletas/Govinda
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.index
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - 首页: index.md
  - 学习:
      - 学习资源与方法: learning.md
  - 设计:
      - 设计文档: specs/2026-06-09-qwen-inference-optimization-design.md
  - 计划:
      - 实施计划: superpowers/plans/2026-06-09-qwen-dcu-inference-optimization.md
  - 决策:
      - 0001 DCU SKU: decisions/0001-dcu-sku.md
      - 0002 测试集访问: decisions/0002-testset-access.md
      - 0003 Baseline 数字来源: decisions/0003-baseline-source.md
      - 0006 vLLM 0.18.1 读图: decisions/0006-vllm-readmap.md
      - "0006a Docker 构建": decisions/0006a-docker-build.md
      - 0007 编译决策矩阵: decisions/0007-coupling-matrix.md
      - 0008 块大小假设: decisions/0008-blocksize-hypothesis.md
      - 0013 torch.compile ROI: decisions/0013-torch-compile-roi.md
  - 进度:
      - Weekly Standup: weekly/progress.md
  - 资源:
      - AI 协作: AGENTS.md
      - AI Prompts 库: ai-prompts/README.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Recoletas/Govinda
      name: GitHub 仓库

copyright: Copyright &copy; 2026 Recoletas and Govinda contributors · MIT License
